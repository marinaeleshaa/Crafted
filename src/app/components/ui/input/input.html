<div class="w-full">
  <div class="relative">
    <!-- Animated Label -->
    @if (label()) {
      <label
        [for]="id()"
        class="absolute text-secondary pointer-events-none transition-all duration-500 ease-in-out"
        [class]="labelClasses()"
      >
        {{ label() }}
        @if (required()) {
          <!-- <span class="text-pop">*</span> -->
        }
      </label>
    }

    <div class="relative">
      <input
        (blur)="onBlur()"
        [(ngModel)]="inputValue"
        (ngModelChange)="onValueChange($event)"
        [id]="id()"
        [type]="mainType()"
        [name]="name()"
        [placeholder]="placeholder()"
        [required]="required()"
        [disabled]="disabled()"
        [class]="inputClasses()"
      />

      <!-- Password toggle icon — color reflects error state -->
      @if (type() === 'password') {
        <lucide-icon
          [img]="eyeIcon()"
          [ngClass]="shouldShowError() ? 'text-pop' : 'text-primary'"
          class="absolute right-2 top-1/2 transform -translate-y-1/2 cursor-pointer"
          (click)="togglePasswordVisibility()"
        ></lucide-icon>
      }

      <!-- Error icon for non-password fields -->
      @if (shouldShowError() && type() !== 'password') {
        <div class="absolute inset-y-0 right-0 pr-3 flex items-center pointer-events-none">
          <svg class="h-5 w-5 text-pop" fill="currentColor" viewBox="0 0 20 20">
            <path
              fill-rule="evenodd"
              d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7 4a1 1 0 11-2 0 1 1 0 012 0zm-1-9a1 1 0 00-1 1v4a1 1 0 102 0V6a1 1 0 00-1-1z"
              clip-rule="evenodd"
            />
          </svg>
        </div>
      }
    </div>
  </div>

  <!-- Error message -->
  @if (shouldShowError()) {
    <p class="mt-2 text-sm text-pop">{{ error() }}</p>
  }

  <!-- Hint — only shown when no active error -->
  @if (hint() && !shouldShowError()) {
    <p class="mt-2 text-sm text-foreground/60">{{ hint() }}</p>
  }
</div>
